{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-gamepad"></i> Snake Game</h2>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card shadow-lg">
                <div class="card-body">
                    <canvas id="snakeCanvas" width="400" height="400" class="border rounded mx-auto d-block" style="background-color: #111; max-width: 100%; height: auto; touch-action: none;"></canvas>
                    <div class="mt-3">
                        <h3>Score: <span id="score">0</span></h3>
                        <button id="restartBtn" class="btn btn-primary"><i class="fas fa-redo-alt"></i> Restart</button>
                    </div>
                    
                    <!-- On‑screen control buttons (touch‑friendly, no scroll) -->
                    <div class="d-flex justify-content-center mt-3">
                        <div class="btn-group" role="group">
                            <button class="btn btn-dark control-btn" data-dir="UP" style="touch-action: manipulation;">▲</button>
                        </div>
                    </div>
                    <div class="d-flex justify-content-center mt-2">
                        <div class="btn-group" role="group">
                            <button class="btn btn-dark control-btn" data-dir="LEFT" style="touch-action: manipulation;">◀</button>
                            <button class="btn btn-dark control-btn" data-dir="DOWN" style="touch-action: manipulation;">▼</button>
                            <button class="btn btn-dark control-btn" data-dir="RIGHT" style="touch-action: manipulation;">▶</button>
                        </div>
                    </div>
                    <p class="mt-3 text-muted">Use arrow keys on keyboard, or tap the buttons above. The page will not scroll while playing.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const scoreSpan = document.getElementById('score');
        
        // Game variables
        let snake = [
            {x: 200, y: 200},
            {x: 190, y: 200},
            {x: 180, y: 200},
            {x: 170, y: 200},
            {x: 160, y: 200}
        ];
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let food = {};
        let score = 0;
        let gameLoop = null;
        let gameRunning = true;
        const gridSize = 10;
        const canvasSize = 400;
        
        function randomFood() {
            const cols = canvasSize / gridSize;
            const rows = canvasSize / gridSize;
            let newFood = {
                x: Math.floor(Math.random() * cols) * gridSize,
                y: Math.floor(Math.random() * rows) * gridSize
            };
            for (let segment of snake) {
                if (segment.x === newFood.x && segment.y === newFood.y) {
                    return randomFood();
                }
            }
            return newFood;
        }
        
        function draw() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0, 0, canvasSize, canvasSize);
            
            ctx.fillStyle = '#48A9A6';
            for (let i = 0; i < snake.length; i++) {
                ctx.fillRect(snake[i].x, snake[i].y, gridSize-1, gridSize-1);
            }
            ctx.fillStyle = '#ffd700';
            ctx.fillRect(snake[0].x, snake[0].y, gridSize-1, gridSize-1);
            
            ctx.fillStyle = '#ff6666';
            ctx.fillRect(food.x, food.y, gridSize-1, gridSize-1);
        }
        
        function update() {
            if (!gameRunning) return;
            
            direction = nextDirection;
            
            let newHead = {x: snake[0].x, y: snake[0].y};
            switch(direction) {
                case 'RIGHT': newHead.x += gridSize; break;
                case 'LEFT':  newHead.x -= gridSize; break;
                case 'UP':    newHead.y -= gridSize; break;
                case 'DOWN':  newHead.y += gridSize; break;
            }
            
            // Wall collision
            if (newHead.x < 0 || newHead.x >= canvasSize || newHead.y < 0 || newHead.y >= canvasSize) {
                gameOver();
                return;
            }
            
            // Self collision
            for (let i = 0; i < snake.length; i++) {
                if (newHead.x === snake[i].x && newHead.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }
            
            let ateFood = (newHead.x === food.x && newHead.y === food.y);
            snake.unshift(newHead);
            if (!ateFood) {
                snake.pop();
            } else {
                score++;
                scoreSpan.innerText = score;
                food = randomFood();
            }
            draw();
        }
        
        function gameOver() {
            if (!gameRunning) return;
            gameRunning = false;
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = null;
            alert(`Game Over! Your score: ${score}`);
        }
        
        function restartGame() {
            snake = [
                {x: 200, y: 200},
                {x: 190, y: 200},
                {x: 180, y: 200},
                {x: 170, y: 200},
                {x: 160, y: 200}
            ];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            scoreSpan.innerText = '0';
            gameRunning = true;
            food = randomFood();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, 100);
            draw();
        }
        
        // Keyboard controls with scroll prevention
        function handleKeydown(e) {
            const key = e.key;
            if (key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight') {
                e.preventDefault();
            }
            if (!gameRunning) return;
            if (key === 'ArrowRight' && direction !== 'LEFT') {
                nextDirection = 'RIGHT';
            } else if (key === 'ArrowLeft' && direction !== 'RIGHT') {
                nextDirection = 'LEFT';
            } else if (key === 'ArrowUp' && direction !== 'DOWN') {
                nextDirection = 'UP';
            } else if (key === 'ArrowDown' && direction !== 'UP') {
                nextDirection = 'DOWN';
            }
        }
        
        // On‑screen button controls (prevent default and touch scrolling)
        function setupButtons() {
            const btns = document.querySelectorAll('.control-btn');
            btns.forEach(btn => {
                const prevent = function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (!gameRunning) return;
                    const dir = this.getAttribute('data-dir');
                    if (dir === 'RIGHT' && direction !== 'LEFT') nextDirection = 'RIGHT';
                    else if (dir === 'LEFT' && direction !== 'RIGHT') nextDirection = 'LEFT';
                    else if (dir === 'UP' && direction !== 'DOWN') nextDirection = 'UP';
                    else if (dir === 'DOWN' && direction !== 'UP') nextDirection = 'DOWN';
                };
                btn.addEventListener('click', prevent);
                btn.addEventListener('touchstart', prevent, { passive: false });
            });
        }
        
        // Also prevent touch scrolling on canvas
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
        }, { passive: false });
        
        function init() {
            food = randomFood();
            draw();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, 100);
            window.addEventListener('keydown', handleKeydown);
            setupButtons();
            document.getElementById('restartBtn').addEventListener('click', () => {
                restartGame();
            });
        }
        
        init();
    })();
</script>

<style>
    .control-btn {
        font-size: 1.8rem;
        width: 70px;
        height: 70px;
        margin: 0 5px;
        border-radius: 50%;
        background-color: #333;
        color: white;
        border: none;
        transition: 0.1s;
        touch-action: manipulation;  /* prevents zoom on double-tap */
        user-select: none;
    }
    .control-btn:active {
        transform: scale(0.95);
        background-color: var(--accent, #ffd700);
        color: black;
    }
    @media (max-width: 500px) {
        .control-btn {
            width: 55px;
            height: 55px;
            font-size: 1.4rem;
        }
    }
</style>
{% endblock %}
